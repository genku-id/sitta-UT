<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - SITTA</title>

    <script>
    (function () {
      const mode = localStorage.getItem("mode");
      if (mode === "dark") {
        document.documentElement.classList.add("dark");
      }
    })();
  </script>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="dashboard-page">

  <button id="modeBtn" class="mode-toggle" onclick="toggleMode()" aria-label="Toggle Mode">
  <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
  <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
</button>

  <div class="dashboard">

    <div class="header">
      <div class="header-left">
        <img src="assets/logo-ut.png" alt="Logo UT" class="logo-header">
        <div class="header-text">
          <h2 id="greeting">Halo,</h2>
          <p>Selamat datang di SITTA-UT</p>
        </div>
      </div>

      <div class="header-right">
        <div class="user-menu">
          <div class="user-name" onclick="toggleUserMenu()">
            <span id="namaUser"></span>
            <svg class="user-arrow" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7" />
            </svg>
          </div>

          <div id="userDropdown" class="user-dropdown">
            <p onclick="openProfileModal()">Profil</p>
            <p onclick="logout()">Logout</p>
          </div>
        </div>
      </div>
    </div>

    <div class="menu-grid">

      <div class="menu-item" onclick="goTo('stok.html')">
        <div class="icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18c-2.305 0-4.408.867-6 2.292m0-14.25v14.25" />
          </svg>
        </div>
        <h3>Informasi Bahan Ajar</h3>
      </div>

    <div class="menu-item" onclick="goTo('tracking.html')">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 10-3 0 1.5 1.5 0 003 0zM19.5 18.75a1.5 1.5 0 10-3 0 1.5 1.5 0 003 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.5 15h12.5m-12.5 0l-1.5-7h14.5l1.5 7m-14.5 0h14.5m-14.5 0a2.5 2.5 0 002.5 2.5h11a2.5 2.5 0 002.5-2.5m-16.5-7h16.5m-16.5 0L3.5 15M21.5 8h-18" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 8.25V5.25A2.25 2.25 0 0014.25 3h-4.5A2.25 2.25 0 007.5 5.25v3" />
        </svg>
      </div>
      <h3>Tracking Pengiriman</h3>
    </div>

    <div class="menu-item" onclick="goTo('laporan.html')">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
      </div>
      <h3>Laporan</h3>
    </div>

    <div class="menu-item" onclick="goTo('histori.html')">
      <div class="icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h3>Histori Transaksi</h3>
    </div>

    </div>

  </div>

  <div id="profileModal" class="modal modal-center">
    <div class="modal-content">
      <h3>Profil Pengguna</h3>

      <div class="profile-list">
        <p><strong>ID</strong><span id="profileId"></span></p>
        <p><strong>Nama</strong><span id="profileNama"></span></p>
        <p><strong>Email</strong><span id="profileEmail"></span></p>
        <p><strong>Role</strong><span id="profileRole"></span></p>
        <p><strong>Lokasi</strong><span id="profileLokasi"></span></p>
      </div>

      <button onclick="openChangePasswordModal()">Ganti Password</button>
      <button class="btn-secondary" onclick="closeProfileModal()">Tutup</button>
    </div>
  </div>

  <div id="changePasswordModal" class="modal modal-center">
    <div class="modal-content">
      <h3>Verifikasi Email</h3>

      <p class="modal-text">
        Masukkan email akun untuk verifikasi sebelum mengganti password.
      </p>

      <input type="email" id="verifyPasswordEmail" placeholder="Masukkan email">

      <button onclick="verifyChangePassword()">Verifikasi</button>
      <button class="btn-secondary" onclick="closeChangePasswordModal()">Batal</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
  <script>cekLogin();loadMode();</script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
